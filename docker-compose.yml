services:
  db:
    image: postgres
    ports:
      - "5432:5432"
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: password
  spring-scala:
    image: image/name:latest
    ports:
      - "8080:8080"
    environment:
      - SERVICE_BINDING_ROOT=/bindings
      - org.springframework.cloud.bindings.boot.enable=true
    volumes:
      - ./bindings:/bindings